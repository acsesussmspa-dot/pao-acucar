<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tratativas de Ponto — ESF Pão de Açúcar</title>
<style>
  :root {
    --roxo-escuro: #3d2a5c;
    --roxo-medio: #6c4b9e;
    --roxo-claro: #efe6fb;
    --roxo-claro2: #e4d6f5;
    --fundo: #f6f3fa;
    --texto: #2c2438;
    --borda: #d9c9ec;
    --alerta: #b45309;
    --alerta-fundo: #fef3e2;
    --erro-fundo: #f8d7da;
    --erro-texto: #721c24;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--fundo);
    color: var(--texto);
    padding: 24px 16px 60px;
  }

  .container { max-width: 600px; margin: 0 auto; }

  header {
    background: linear-gradient(135deg, var(--roxo-escuro), #55397e);
    color: #fff;
    padding: 24px 22px;
    border-radius: 12px 12px 0 0;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #d9c9f5;
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  header h1 {
    margin: 0;
    font-size: 22px;
  }

  header p {
    margin: 6px 0 0;
    font-size: 14px;
    color: #e4d6f5;
  }

  form {
    background: #fff;
    padding: 22px;
    border-radius: 0 0 12px 12px;
    border: 1px solid var(--borda);
    border-top: none;
  }

  .secao {
    margin-bottom: 22px;
  }

  .secao-titulo {
    font-size: 13px;
    font-weight: 700;
    color: var(--roxo-medio);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--roxo-claro2);
  }

  .campo {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--texto);
  }

  label .obrigatorio {
    color: var(--alerta);
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--borda);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: #fbfcfa;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--roxo-medio);
    background: #fff;
  }

  textarea {
    min-height: 80px;
    resize: vertical;
  }

  .linha-dupla {
    display: flex;
    gap: 12px;
  }

  .linha-dupla .campo {
    flex: 1;
  }

  .unidade-fixa {
    background: var(--roxo-claro);
    color: var(--roxo-escuro);
    font-weight: 600;
    border: 1px solid #b7a2d9;
  }

  .ocorrencia-bloco {
    border: 1px solid var(--roxo-claro2);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    background: #fdfcff;
  }

  .ocorrencia-bloco .remover {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #a33;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    width: auto;
    margin: 0;
  }

  .ocorrencia-numero {
    font-size: 12px;
    font-weight: 700;
    color: var(--roxo-medio);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  #btnAdicionarOcorrencia {
    background: #fff;
    color: var(--roxo-medio);
    border: 1.5px dashed var(--roxo-medio);
    font-weight: 600;
    margin-bottom: 6px;
  }

  #btnAdicionarOcorrencia:hover {
    background: var(--roxo-claro);
  }

  button {
    width: 100%;
    padding: 13px;
    background: var(--roxo-escuro);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }

  button:hover { background: var(--roxo-medio); }
  button:disabled { background: #b7a2d9; cursor: not-allowed; }

  .status {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .status.sucesso {
    display: block;
    background: var(--roxo-claro);
    color: var(--roxo-escuro);
  }

  .status.erro {
    display: block;
    background: var(--erro-fundo);
    color: var(--erro-texto);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="eyebrow">ESF Pão de Açúcar</p>
    <h1>📋 Tratativas de Registro de Ponto</h1>
    <p>Preencha uma ou mais ocorrências. Campos com <span style="color:#f5c4a0">*</span> são obrigatórios.</p>
  </header>

  <form id="formTratativas">
    <div class="secao">
      <p class="secao-titulo">Identificação</p>

      <div class="campo">
        <label>Unidade</label>
        <input type="text" class="unidade-fixa" value="Esf Pão de Açúcar" readonly>
      </div>

      <div class="campo">
        <label for="nome">Nome completo <span class="obrigatorio">*</span></label>
        <input type="text" id="nome" required>
      </div>

      <div class="linha-dupla">
        <div class="campo">
          <label for="matricula">Matrícula (com dígito) <span class="obrigatorio">*</span></label>
          <input type="text" id="matricula" required placeholder="Ex: 16367-1">
        </div>
        <div class="campo">
          <label for="cargo">Cargo <span class="obrigatorio">*</span></label>
          <select id="cargo" required>
            <option value="" disabled selected>Selecione...</option>
            <option>Agente Administrativo</option>
            <option>Agente Comunitário de Saúde</option>
            <option>Agente Social</option>
            <option>Auxiliar de dentista</option>
            <option>Auxiliar de Enfermagem</option>
            <option>Coordenador(a)</option>
            <option>Dentista</option>
            <option>Educador(a) Físico(a)</option>
            <option>Enfermeiro(a)</option>
            <option>Fisioterapeuta</option>
            <option>Fonoaudiólogo(a)</option>
            <option>Gerente de serviços</option>
            <option>Médico(a)</option>
            <option>Nutricionista</option>
            <option>Psicólogo(a)</option>
            <option>Técnico em Radiologia</option>
            <option>Técnico(a) de Enfermagem</option>
          </select>
        </div>
      </div>

      <div class="campo">
        <label for="email">E-mail para confirmação <span class="obrigatorio">*</span></label>
        <input type="email" id="email" required placeholder="seuemail@gmail.com">
      </div>
    </div>

    <div class="secao">
      <p class="secao-titulo">Ocorrências</p>
      <div id="listaOcorrencias"></div>
      <button type="button" id="btnAdicionarOcorrencia">+ Adicionar outra ocorrência</button>
    </div>

    <button type="submit" id="btnEnviar">Enviar tratativa(s)</button>
    <div class="status" id="statusMsg"></div>
  </form>
</div>

<template id="templateOcorrencia">
  <div class="ocorrencia-bloco">
    <button type="button" class="remover">✕ remover</button>
    <p class="ocorrencia-numero">Ocorrência <span class="num">1</span></p>

    <div class="campo">
      <label>Data da ocorrência <span class="obrigatorio">*</span></label>
      <input type="date" class="campo-data" required>
    </div>

    <div class="campo">
      <label>Tipo de ocorrência <span class="obrigatorio">*</span></label>
      <select class="campo-ocorrencia" required>
        <option value="" disabled selected>Selecione...</option>
        <option>Atestado de Horas (Enviar atestado para Secretaria)</option>
        <option>Esquecimento</option>
        <option>Equipamento com Defeito</option>
        <option>Problemas na Leitura do Registro</option>
        <option>Troca de Horário</option>
        <option>Serviço Fora da Unidade</option>
        <option>Falta Justificada e Abonada</option>
        <option>Migrar Registro</option>
        <option>Compensar Banco de Horas</option>
        <option>Júri</option>
        <option>Atraso Superior a 15 Minutos</option>
        <option>Eleições</option>
        <option>Casar Batida</option>
        <option>Criar Horário para Funcionário</option>
        <option>Treinamento</option>
        <option>Atestado de Dia(s) (Informar Nº Processo Digital)</option>
      </select>
    </div>

    <div class="linha-dupla">
      <div class="campo">
        <label>Entrada</label>
        <input type="time" class="campo-entrada">
      </div>
      <div class="campo">
        <label>Saída</label>
        <input type="time" class="campo-saida">
      </div>
    </div>
    <p style="font-size:12px;color:#7a6a94;margin:-8px 0 12px;">Preencha só o horário onde ocorreu o problema (entrada, saída, ou os dois).</p>

    <div class="campo">
      <label>Justificativa <span class="obrigatorio">*</span></label>
      <textarea class="campo-justificativa" required placeholder="Descreva o motivo da ocorrência"></textarea>
    </div>
  </div>
</template>

<script>
  // ⚠️ Substitua pela URL do seu Google Apps Script Web App
  const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxE_MISca1Dvo36m3ckVPb3Kq8yM06UQ0YvIjZGgTAFykkCXspxrMCE-Ess-sFLd2PUzQ/exec";

  const listaOcorrencias = document.getElementById('listaOcorrencias');
  const template = document.getElementById('templateOcorrencia');
  const form = document.getElementById('formTratativas');
  const btn = document.getElementById('btnEnviar');
  const statusMsg = document.getElementById('statusMsg');

  function renumerar() {
    document.querySelectorAll('.ocorrencia-bloco').forEach((bloco, i) => {
      bloco.querySelector('.num').textContent = i + 1;
      bloco.querySelector('.remover').style.display = i === 0 ? 'none' : 'block';
    });
  }

  function adicionarOcorrencia() {
    const clone = template.content.cloneNode(true);
    const bloco = clone.querySelector('.ocorrencia-bloco');
    bloco.querySelector('.remover').addEventListener('click', () => {
      bloco.remove();
      renumerar();
    });
    listaOcorrencias.appendChild(clone);
    renumerar();
  }

  document.getElementById('btnAdicionarOcorrencia').addEventListener('click', adicionarOcorrencia);
  adicionarOcorrencia(); // primeira ocorrência já vem pronta

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const ocorrencias = [];
    document.querySelectorAll('.ocorrencia-bloco').forEach(bloco => {
      ocorrencias.push({
        data: bloco.querySelector('.campo-data').value,
        ocorrencia: bloco.querySelector('.campo-ocorrencia').value,
        entrada: bloco.querySelector('.campo-entrada').value,
        saida: bloco.querySelector('.campo-saida').value,
        justificativa: bloco.querySelector('.campo-justificativa').value
      });
    });

    const dados = {
      unidade: "Esf Pão de Açúcar",
      nome: document.getElementById('nome').value,
      matricula: document.getElementById('matricula').value,
      cargo: document.getElementById('cargo').value,
      email: document.getElementById('email').value,
      ocorrencias: ocorrencias
    };

    btn.disabled = true;
    btn.textContent = "Enviando...";
    statusMsg.className = "status";

    try {
      await fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(dados)
      });

      statusMsg.className = "status sucesso";
      statusMsg.textContent = "✅ Tratativa(s) enviada(s) com sucesso!";
      form.reset();
      listaOcorrencias.innerHTML = "";
      adicionarOcorrencia();
    } catch (err) {
      statusMsg.className = "status erro";
      statusMsg.textContent = "❌ Erro ao enviar. Tente novamente.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Enviar tratativa(s)";
    }
  });
</script>
</body>
</html>
